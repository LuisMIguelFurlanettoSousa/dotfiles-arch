# eDP-1: notebook BOE (tela interna do notebook)
monitor = eDP-1, 1920x1080@144, 0x0, 1

# LG ULTRAGEAR 27" (serial 412AZMG05219) — FHD@180Hz é o máximo refresh via HDMI.
# Painel limita a 420 MHz dotclock no HDMI (QHD@180 só seria possível via DisplayPort).
# Identificado por descrição do EDID, não por "HDMI-A-1", pra que a regra não caia em
# qualquer outro monitor plugado na mesma porta no futuro.
monitor = desc:LG Electronics LG ULTRAGEAR 412AZMG05219, 1920x1080@180, 1920x0, 1

# Fallback para qualquer outro monitor não mapeado explicitamente acima:
# usa o modo preferred do EDID e posiciona automaticamente.
monitor = , preferred, auto, 1
