# See https://wiki.hyprland.org/Configuring/Keywords/ for more

$mainMod = SUPER

# Example binds, see https://wiki.hyprland.org/Configuring/Binds/ for more
bind = $mainMod, Return, exec, $terminal
bind = $mainMod, C, killactive, 
bind = $mainMod, Q, killactive, 
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, V, togglefloating, 
bind = $mainMod, Space, exec, $menu
bind = $mainMod, R, exec, $menu
bind = $mainMod, P, pseudo, # dwindle
bind = $mainMod, T, togglesplit, # dwindle
bind = $mainMod SHIFT, T, exec, ~/.config/hypr/scripts/reopen-window.sh
bind = $mainMod, F, fullscreen, 1 # maximizar (mantém waybar/gaps)
bind = $mainMod SHIFT, F, fullscreen, 0 # fullscreen real
bind = $mainMod SHIFT, L, exec, hyprlock
bind = $mainMod SHIFT, Q, exec, wlogout -p layer-shell
bind = $mainMod SHIFT, B, exec, sh -c "killall waybar 2>/dev/null; waybar > /dev/null 2>&1 &"
# Seletor de wallpaper (Rofi + swww)
bind = $mainMod, W, exec, ~/.config/hypr/scripts/wallpaper-picker.sh

# Navegação inteligente: fullscreen → troca workspace, normal → move foco
bind = $mainMod, left, exec, ~/.config/hypr/scripts/smart-focus.sh l
bind = $mainMod, right, exec, ~/.config/hypr/scripts/smart-focus.sh r
bind = $mainMod, up, exec, ~/.config/hypr/scripts/smart-focus.sh u
bind = $mainMod, down, exec, ~/.config/hypr/scripts/smart-focus.sh d

# Trocar janela de posição com mainMod + SHIFT + setas (sai do fullscreen antes)
bind = $mainMod SHIFT, left, exec, ~/.config/hypr/scripts/swap-window.sh l
bind = $mainMod SHIFT, right, exec, ~/.config/hypr/scripts/swap-window.sh r
bind = $mainMod SHIFT, up, exec, ~/.config/hypr/scripts/swap-window.sh u
bind = $mainMod SHIFT, down, exec, ~/.config/hypr/scripts/swap-window.sh d

# Navegação inteligente com hjkl: fullscreen → troca workspace, normal → move foco
bind = $mainMod, H, exec, ~/.config/hypr/scripts/smart-focus.sh l
bind = $mainMod, K, exec, ~/.config/hypr/scripts/smart-focus.sh u
bind = $mainMod, J, exec, ~/.config/hypr/scripts/smart-focus.sh d
bind = $mainMod, L, exec, ~/.config/hypr/scripts/smart-focus.sh r

# screenshot keybind
bind = $mainMod, S, exec, bash -c 'MONITOR=$(hyprctl activeworkspace -j | jq -r ".monitor"); grim -o "$MONITOR" "${HOME}/Pictures/screenshots/SS$(date +%Y-%m-%d_%H-%M-%S).png" && wl-copy < "${HOME}/Pictures/screenshots/SS$(date +%Y-%m-%d_%H-%M-%S).png"'

# screenshot + crop keybind
bind = $mainMod SHIFT, S, exec, bash -c 'grim -g "$(slurp)" "${HOME}/Pictures/screenshots/SS$(date +%Y-%m-%d_%H-%M-%S).png" && wl-copy < "${HOME}/Pictures/screenshots/SS$(date +%Y-%m-%d_%H-%M-%S).png"'

# toggle no border, no gaps, no border radius
bind = $mainMod SHIFT CTRL, B, exec, ~/.config/hypr/scripts/toggle-compact.sh

# Example special workspace (scratchpad) COMMENTED OUT FOR SCREENSHOT KEYBIND
# bind = $mainMod, S, togglespecialworkspace, magic
# bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Redimensionar janela ativa com mainMod + CTRL + setas
binde = $mainMod CTRL, right, resizeactive, 30 0
binde = $mainMod CTRL, left, resizeactive, -30 0
binde = $mainMod CTRL, up, resizeactive, 0 -30
binde = $mainMod CTRL, down, resizeactive, 0 30

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume -l 1.0 @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindl  = , XF86AudioMute,        exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
